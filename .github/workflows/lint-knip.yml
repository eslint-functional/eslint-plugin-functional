name: Lint Knip

on:
  # pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  lint_knip:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: ./.github/actions/prepare
      - run: pnpm run lint:knip
