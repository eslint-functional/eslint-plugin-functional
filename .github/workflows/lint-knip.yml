name: Lint Knip

on:
  # pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  lint_knip:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/prepare
      - run: pnpm run lint:knip
