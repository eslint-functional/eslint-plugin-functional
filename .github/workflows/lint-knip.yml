name: Lint Knip

on:
  # pull_request:
  workflow_dispatch:
  workflow_call:

jobs:
  lint_knip:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./.github/actions/prepare
      - run: pnpm run lint:knip
